# BLAKE2s Entropy Pool Test Configuration

# Core System
CONFIG_NEWLIB_LIBC=y
CONFIG_POSIX_API=y

# Memory
CONFIG_MAIN_STACK_SIZE=8192
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_IDLE_STACK_SIZE=2048
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Debugging
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_PRINTK=y
CONFIG_EARLY_CONSOLE=y
CONFIG_ASSERT=y

# Hardware
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_CONSOLE=y
CONFIG_GPIO=y

# ESP32 chip configuration
CONFIG_ESP32_USE_UNSUPPORTED_REVISION=y

# Security - BLAKE2s Entropy Pool
CONFIG_ENTROPY_GENERATOR=y
CONFIG_ENTROPY_BLAKE2S=y
# Keep ESP32 hardware RNG - BLAKE2s pool uses it as backend
CONFIG_ENTROPY_ESP32_RNG=y

# Disable unnecessary features
CONFIG_NETWORKING=n
CONFIG_WIFI=n
CONFIG_SHELL=n
CONFIG_PM=n
CONFIG_MBEDTLS=n
CONFIG_SMP=n